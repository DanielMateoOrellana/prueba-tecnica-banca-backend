server:
  port: 8081

spring:
  application:
    name: banca
  datasource:
    url: jdbc:mysql://localhost:3307/banca?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: banca_user
    password: banca_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: never

banca:
  cupo-diario-retiro: 1000.00

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
